<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Inscription</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="signup-container">
    <div class="signup-grid">
      <!-- POUR LA PARTIE GAUCHE -->
      <div class="form-section">
        <h1 class="title">Ready to start your success story?</h1>
        <p class="subtitle">Signup to our website and start leafing through your favorite literature today!</p>

        <!-- Formulaire d'inscription -->
        <form action="#" method="post" novalidate>
          <div class="form-group">
            <label class="form-label" for="fullname">Full name</label>
            <input 
              type="text" 
              id="fullname" 
              class="input-field" 
              placeholder="Jane Doe" 
              autocomplete="name"
            >
          </div>

          <!-- Champ Email -->
          <div class="form-group">
            <label class="form-label" for="email">Email</label>
            <input 
              type="email" 
              id="email" 
              class="input-field" 
              placeholder="janedoe@mail.com"
              autocomplete="email"
            >
          </div>

          <!-- Domaine d'intérêt (liste déroulante) -->
          <div class="form-group">
            <label class="form-label" for="areaOfInterest">Area of interest</label>
            <select id="areaOfInterest" class="custom-select">
              <option value="" disabled selected>Select your literary passion</option>
              <option value="fiction">Fiction & Novels</option>
              <option value="poetry">Poetry & Prose</option>
              <option value="science">Science & Nature</option>
              <option value="history">History & Biographies</option>
              <option value="fantasy">Fantasy & Adventure</option>
            </select>
          </div>

          <!-- LA CASE A COCHER -->
          <div class="checkbox-wrapper">
            <input type="checkbox" id="termsCheckbox" required>
            <label for="termsCheckbox">
              I agree to the <a href="#" class="terms-link" target="_blank">Terms & Conditions</a>
            </label>
          </div>

          <!-- POUR LE BOUTON -->
          <button type="submit" class="signup-btn">Sign up</button>
        </form>
      </div>

      <!-- PARTIE DROITE -->
      <div class="illustration-section">
        <img 
          src="image.png"
          alt="Illustration"
        >
      </div>
    </div>
  </div>
</body>
</html>
